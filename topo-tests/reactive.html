<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Topo · Cursor reactive</title>
  <link rel="stylesheet" href="shared.css" />
</head>
<body>
  <div class="topo"><canvas id="cv"></canvas></div>

  <div class="center-mark">
    <div class="ring"></div>
    <div class="txt">Move the cursor</div>
  </div>

  <div class="label">
    02 / Interactive
    <span class="sub">Cursor-reactive displacement</span>
  </div>

  <nav class="tabs">
    <a href="index.html">Gallery</a>
    <a href="noise.html">Noise</a>
    <a href="reactive.html" class="active">Reactive</a>
    <a href="parallax.html">Parallax</a>
  </nav>

<script>
/* ============================================================
   Cursor-reactive topography.

   The contour lines are static-ish (with a gentle ambient drift)
   but each VERTEX is displaced by a soft falloff field centered
   on the cursor. The effect is like the lines are sheets of
   silk and your cursor is pressing into them.

   Implementation:
   - Generate N concentric-ish polylines as arrays of {x,y}.
   - Each frame: for every point, compute the displacement from
     the cursor based on distance, apply a Gaussian-ish push.
   - Smooth the cursor position with a low-pass filter so the
     interaction feels viscous rather than jittery.
   ============================================================ */

const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');

let W = 0, H = 0, dpr = 1;
function resize() {
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = cv.clientWidth = window.innerWidth;
  H = cv.clientHeight = window.innerHeight;
  cv.width = W * dpr; cv.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  rebuild();
}
window.addEventListener('resize', resize);

/* --- Contour generation ---
   Two off-center "peaks". Around each peak we trace concentric
   contours whose radii vary irregularly to feel organic, not
   like rings. Each contour is sampled at ~120 points. */
const POINTS_PER_LINE = 140;
let lines = [];

function rand(seed) {           // deterministic per-page noise
  let s = seed | 0;
  return () => {
    s = (s * 1664525 + 1013904223) | 0;
    return ((s >>> 0) / 4294967295);
  };
}

function buildPeak(cx, cy, baseR, count, seed) {
  const r = rand(seed);
  const harmonics = [];           // few low-freq sinusoids per ring
  for (let h = 0; h < 5; h++) {
    harmonics.push({
      k: 2 + Math.floor(r() * 5),    // wave count around ring
      a: 0.05 + r() * 0.18,          // amplitude (fraction of radius)
      p: r() * Math.PI * 2           // phase
    });
  }
  for (let c = 0; c < count; c++) {
    const radius = baseR * (0.18 + c * 0.16);
    const pts = [];
    for (let i = 0; i < POINTS_PER_LINE; i++) {
      const theta = (i / POINTS_PER_LINE) * Math.PI * 2;
      let rr = radius;
      for (const h of harmonics) rr += radius * h.a * Math.sin(theta * h.k + h.p + c * 0.4);
      pts.push({
        x: cx + Math.cos(theta) * rr,
        y: cy + Math.sin(theta) * rr,
        ox: cx + Math.cos(theta) * rr,    // original (rest) position
        oy: cy + Math.sin(theta) * rr,
      });
    }
    lines.push({ pts, alpha: 0.32 + (c / count) * 0.18 });
  }
}

function rebuild() {
  lines = [];
  // Primary peak: roughly upper-right
  buildPeak(W * 0.62, H * 0.42, Math.min(W, H) * 1.05, 7, 0xa1b2c3);
  // Secondary peak: lower-left, smaller (creates dialogue between two features)
  buildPeak(W * 0.22, H * 0.78, Math.min(W, H) * 0.7,  5, 0xd4e5f6);
}

/* --- Cursor input with low-pass smoothing --- */
let mx = -9999, my = -9999;          // raw cursor (off-screen initially)
let sx = -9999, sy = -9999;          // smoothed cursor
window.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
window.addEventListener('mouseleave', () => { mx = -9999; my = -9999; });
window.addEventListener('touchmove', e => {
  if (e.touches[0]) { mx = e.touches[0].clientX; my = e.touches[0].clientY; }
}, { passive: true });

const PUSH = 65;                     // max displacement (px)
const SIGMA = 220;                   // falloff radius (px)
const SIGMA2 = SIGMA * SIGMA;

function loop(t) {
  // ease the smoothed cursor toward raw
  if (sx < -1000) { sx = mx; sy = my; }
  sx += (mx - sx) * 0.12;
  sy += (my - sy) * 0.12;

  // ambient drift — very slow, gives the field life even at rest
  const drift = t * 0.00015;

  ctx.clearRect(0, 0, W, H);
  ctx.lineWidth = 1;
  ctx.strokeStyle = '#cce046';
  ctx.lineJoin = 'round';
  ctx.lineCap = 'round';

  for (const ln of lines) {
    ctx.globalAlpha = ln.alpha;
    ctx.beginPath();
    for (let i = 0; i < ln.pts.length; i++) {
      const p = ln.pts[i];
      // soft ambient breathing: each point sways with its angle phase
      const phase = i / ln.pts.length * Math.PI * 2;
      const ambX = Math.cos(drift + phase) * 1.6;
      const ambY = Math.sin(drift * 1.3 + phase) * 1.6;

      let x = p.ox + ambX;
      let y = p.oy + ambY;

      // cursor displacement: Gaussian falloff
      const dx = x - sx, dy = y - sy;
      const d2 = dx * dx + dy * dy;
      if (d2 < SIGMA2 * 4 && sx > -1000) {
        const fall = Math.exp(-d2 / (2 * SIGMA2));
        const dist = Math.sqrt(d2) + 0.0001;
        const push = PUSH * fall;
        x += (dx / dist) * push;     // push points AWAY from cursor
        y += (dy / dist) * push;
      }

      p.x = x; p.y = y;
      if (i === 0) ctx.moveTo(x, y);
      else         ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.stroke();
  }
  requestAnimationFrame(loop);
}

resize();
requestAnimationFrame(loop);
</script>
</body>
</html>
