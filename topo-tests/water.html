<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Topo · Water</title>
  <link rel="stylesheet" href="shared.css" />
</head>
<body>
  <div class="topo"><canvas id="cv"></canvas></div>

  <div class="center-mark">
    <div class="ring"></div>
    <div class="txt">Move the cursor — leave a wake</div>
  </div>

  <div class="label">
    04 / Hybrid
    <span class="sub">Water surface · cursor leaves a wake</span>
  </div>

  <nav class="tabs">
    <a href="index.html">Gallery</a>
    <a href="noise.html">Noise</a>
    <a href="reactive.html">Reactive</a>
    <a href="parallax.html">Parallax</a>
    <a href="water.html" class="active">Water</a>
  </nav>

<script>
/* ============================================================
   Water-surface topography + cursor wake.

   FIELD (the "water surface"):
     - Smooth large-scale noise (2 octaves, low high-freq amplitude)
     - Faster time evolution than the tectonic noise.html → reads as
       waves rolling, not continents drifting.
     - Output is a continuous height field; contours are isolines.

   WAKE (the cursor trail):
     - Past cursor positions are kept in a ring buffer with timestamps.
     - Each trail point adds a smooth Gaussian "bump" to the field
       that decays over ~2.5 seconds.
     - Older points have lower amplitude AND wider spread (the wake
       diffuses outward as it ages, like real surface ripples).
     - The contour lines literally bend around the trail because the
       isolines of (height + bump) move outward.

   Combined: water surface that mostly drifts on its own, but you
   leave a slowly-fading wake as you move across it.
   ============================================================ */

const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');

let W = 0, H = 0, dpr = 1;
function resize() {
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = cv.clientWidth = window.innerWidth;
  H = cv.clientHeight = window.innerHeight;
  cv.width = W * dpr; cv.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize);
resize();

/* ---- Smooth value noise (same hash as noise.html) ---- */
function hash3(x, y, z) {
  let h = x * 374761393 + y * 668265263 + z * 1274126177;
  h = (h ^ (h >> 13)) * 1274126177;
  h = (h ^ (h >> 16)) >>> 0;
  return (h / 4294967295) * 2 - 1;
}
function smooth(t) { return t * t * (3 - 2 * t); }
function noise3(x, y, z) {
  const xi = Math.floor(x), yi = Math.floor(y), zi = Math.floor(z);
  const xf = x - xi, yf = y - yi, zf = z - zi;
  const u = smooth(xf), v = smooth(yf), w = smooth(zf);
  const n000 = hash3(xi,   yi,   zi);
  const n100 = hash3(xi+1, yi,   zi);
  const n010 = hash3(xi,   yi+1, zi);
  const n110 = hash3(xi+1, yi+1, zi);
  const n001 = hash3(xi,   yi,   zi+1);
  const n101 = hash3(xi+1, yi,   zi+1);
  const n011 = hash3(xi,   yi+1, zi+1);
  const n111 = hash3(xi+1, yi+1, zi+1);
  const x00 = n000 + u * (n100 - n000);
  const x10 = n010 + u * (n110 - n010);
  const x01 = n001 + u * (n101 - n001);
  const x11 = n011 + u * (n111 - n011);
  const y0 = x00 + v * (x10 - x00);
  const y1 = x01 + v * (x11 - x01);
  return y0 + w * (y1 - y0);
}

/* Water field: smooth, broad, slowly evolving.
   2 octaves with strong amplitude falloff = gentle surface.
   Final amplification stretches the distribution outward so we
   actually cross more contour thresholds (value noise is
   bell-shaped; boosting moves more samples into the tails). */
const FIELD_SCALE = 0.0035;        // smaller = wider, more "rolling"
const FIELD_TIME  = 0.00018;       // larger = faster motion
function waterField(x, y, t) {
  const a1 = noise3(x * FIELD_SCALE,        y * FIELD_SCALE,        t * FIELD_TIME);
  const a2 = noise3(x * FIELD_SCALE * 2.3,  y * FIELD_SCALE * 2.3,  t * FIELD_TIME * 1.4) * 0.45;
  return ((a1 + a2) / 1.45) * 1.7;
}

/* ---- Cursor wake ----
   Trail = ring buffer of recent samples. We push at a throttled rate
   so we don't accumulate a wall of redundant points when the cursor
   moves fast. Each entry stores position + the time it was added. */
const TRAIL_MAX = 80;
const TRAIL_LIFE_MS = 2500;          // how long a wake point lives
const TRAIL_MIN_DIST = 12;           // min px between samples
const trail = [];
let mx = -9999, my = -9999;

function pushTrail(x, y, now) {
  const last = trail[trail.length - 1];
  if (last && Math.hypot(x - last.x, y - last.y) < TRAIL_MIN_DIST) return;
  trail.push({ x, y, t: now });
  if (trail.length > TRAIL_MAX) trail.shift();
}

window.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  pushTrail(mx, my, performance.now());
});
window.addEventListener('mouseleave', () => { mx = -9999; my = -9999; });
window.addEventListener('touchmove', e => {
  if (e.touches[0]) {
    mx = e.touches[0].clientX; my = e.touches[0].clientY;
    pushTrail(mx, my, performance.now());
  }
}, { passive: true });

/* Wake contribution at a given (x, y) and time.
   For each live trail point, contribute a Gaussian bump whose
   amplitude decays with age and whose spread WIDENS with age
   (so the wake diffuses outward visually as it fades). */
const WAKE_AMP_PEAK = 1.05;
const WAKE_SIGMA_START = 36;
const WAKE_SIGMA_END   = 110;
function wakeAt(x, y, now) {
  let sum = 0;
  for (let i = trail.length - 1; i >= 0; i--) {
    const p = trail[i];
    const age = (now - p.t) / TRAIL_LIFE_MS;        // 0 -> 1
    if (age >= 1) { trail.splice(0, i + 1); break; } // prune oldest
    const ampFall = (1 - age) * (1 - age);          // quadratic ease-out
    const sigma   = WAKE_SIGMA_START + (WAKE_SIGMA_END - WAKE_SIGMA_START) * age;
    const dx = x - p.x, dy = y - p.y;
    const d2 = dx * dx + dy * dy;
    const k  = -d2 / (2 * sigma * sigma);
    if (k > -8) sum += WAKE_AMP_PEAK * ampFall * Math.exp(k);
  }
  return sum;
}

/* ---- Marching squares ---- */
const MS = [
  [],
  [[3, 0]], [[0, 1]], [[3, 1]],
  [[1, 2]], [[3, 0], [1, 2]], [[0, 2]], [[3, 2]],
  [[2, 3]], [[2, 0]], [[0, 1], [2, 3]], [[2, 1]],
  [[1, 3]], [[1, 0]], [[0, 3]], []
];
function lerp(a, b, t) { return a + (b - a) * t; }
function edgePoint(e, gx, gy, v00, v10, v11, v01, thr, cellPx) {
  const x0 = gx * cellPx, y0 = gy * cellPx;
  const x1 = x0 + cellPx,  y1 = y0 + cellPx;
  let t;
  switch (e) {
    case 0: t = (thr - v00) / (v10 - v00); return [lerp(x0, x1, t), y0];
    case 1: t = (thr - v10) / (v11 - v10); return [x1, lerp(y0, y1, t)];
    case 2: t = (thr - v01) / (v11 - v01); return [lerp(x0, x1, t), y1];
    case 3: t = (thr - v00) / (v01 - v00); return [x0, lerp(y0, y1, t)];
  }
}

/* --- Render --- */
const CELL_PX = 18;
/* More thresholds, denser spacing — gives many parallel-ish lines
   that read as wave troughs/crests on a water surface. */
const THRESHOLDS = [
  -0.85, -0.70, -0.55, -0.42, -0.30, -0.20, -0.10,
   0.0,
   0.10,  0.20,  0.30,  0.42,  0.55,  0.70,  0.85
];
const TOPO_COLOR = '#cce046';

function draw(timeMs) {
  ctx.clearRect(0, 0, W, H);

  const cols = Math.ceil(W / CELL_PX) + 1;
  const rows = Math.ceil(H / CELL_PX) + 1;
  const N = (cols + 1) * (rows + 1);
  const field = new Float32Array(N);

  // Sample base water field
  for (let j = 0; j <= rows; j++) {
    for (let i = 0; i <= cols; i++) {
      field[j * (cols + 1) + i] = waterField(i * CELL_PX, j * CELL_PX, timeMs);
    }
  }
  // Add cursor wake on top (only if trail has entries)
  if (trail.length) {
    for (let j = 0; j <= rows; j++) {
      for (let i = 0; i <= cols; i++) {
        field[j * (cols + 1) + i] += wakeAt(i * CELL_PX, j * CELL_PX, timeMs);
      }
    }
  }

  ctx.lineWidth = 1;
  ctx.strokeStyle = TOPO_COLOR;
  ctx.lineCap = 'round';

  for (let ti = 0; ti < THRESHOLDS.length; ti++) {
    const thr = THRESHOLDS[ti];
    const distFromMid = Math.abs(ti - (THRESHOLDS.length - 1) / 2);
    ctx.globalAlpha = 0.50 - distFromMid * 0.035;

    ctx.beginPath();
    for (let j = 0; j < rows; j++) {
      for (let i = 0; i < cols; i++) {
        const v00 = field[j * (cols + 1) + i];
        const v10 = field[j * (cols + 1) + i + 1];
        const v11 = field[(j + 1) * (cols + 1) + i + 1];
        const v01 = field[(j + 1) * (cols + 1) + i];
        let key = 0;
        if (v00 > thr) key |= 1;
        if (v10 > thr) key |= 2;
        if (v11 > thr) key |= 4;
        if (v01 > thr) key |= 8;
        const segs = MS[key];
        for (let s = 0; s < segs.length; s++) {
          const [a, b] = segs[s];
          const [ax, ay] = edgePoint(a, i, j, v00, v10, v11, v01, thr, CELL_PX);
          const [bx, by] = edgePoint(b, i, j, v00, v10, v11, v01, thr, CELL_PX);
          ctx.moveTo(ax, ay);
          ctx.lineTo(bx, by);
        }
      }
    }
    ctx.stroke();
  }
}

function loop(t) {
  draw(t);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
