  <script src="js/main.js?v=17"></script>

  <!-- ============================================================
       Stage water topo: canvas-rendered noise-field contours with a
       scan-reveal pass synced to the wireframe radar animation.
       Replaces the SVG #topo-a / #topo-b that buildTopo() used to
       populate (those calls no-op now since the elements are gone).
       ============================================================ -->
  <script>
  (() => {
    const cv = document.getElementById('waterTopo');
    if (!cv) return;
    const ctx = cv.getContext('2d');

    const offCv  = document.createElement('canvas');
    const offCtx = offCv.getContext('2d');

    let W = 0, H = 0, dpr = 1;
    function resize() {
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      const rect = cv.parentElement.getBoundingClientRect();
      W = Math.max(1, Math.round(rect.width));
      H = Math.max(1, Math.round(rect.height));
      cv.style.width  = W + 'px';
      cv.style.height = H + 'px';
      cv.width  = W * dpr;
      cv.height = H * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      offCv.width  = cv.width;
      offCv.height = cv.height;
      offCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    new ResizeObserver(resize).observe(cv.parentElement);
    resize();

    /* --- Value noise --- */
    function hash3(x, y, z) {
      let h = x * 374761393 + y * 668265263 + z * 1274126177;
      h = (h ^ (h >> 13)) * 1274126177;
      h = (h ^ (h >> 16)) >>> 0;
      return (h / 4294967295) * 2 - 1;
    }
    function smooth(t) { return t * t * (3 - 2 * t); }
    function noise3(x, y, z) {
      const xi=Math.floor(x), yi=Math.floor(y), zi=Math.floor(z);
      const xf=x-xi, yf=y-yi, zf=z-zi;
      const u=smooth(xf), v=smooth(yf), w=smooth(zf);
      const n000=hash3(xi,yi,zi),       n100=hash3(xi+1,yi,zi);
      const n010=hash3(xi,yi+1,zi),     n110=hash3(xi+1,yi+1,zi);
      const n001=hash3(xi,yi,zi+1),     n101=hash3(xi+1,yi,zi+1);
      const n011=hash3(xi,yi+1,zi+1),   n111=hash3(xi+1,yi+1,zi+1);
      const x00=n000+u*(n100-n000), x10=n010+u*(n110-n010);
      const x01=n001+u*(n101-n001), x11=n011+u*(n111-n011);
      const y0=x00+v*(x10-x00),     y1=x01+v*(x11-x01);
      return y0 + w * (y1 - y0);
    }

    const FIELD_SCALE = 0.0035;
    const FIELD_TIME  = 0.00009;
    function waterField(x, y, t) {
      const a1 = noise3(x*FIELD_SCALE,       y*FIELD_SCALE,       t*FIELD_TIME);
      const a2 = noise3(x*FIELD_SCALE*2.3,   y*FIELD_SCALE*2.3,   t*FIELD_TIME*1.4) * 0.45;
      return ((a1 + a2) / 1.45) * 1.7;
    }

    /* --- Marching squares --- */
    const MS = [
      [],
      [[3,0]],[[0,1]],[[3,1]],
      [[1,2]],[[3,0],[1,2]],[[0,2]],[[3,2]],
      [[2,3]],[[2,0]],[[0,1],[2,3]],[[2,1]],
      [[1,3]],[[1,0]],[[0,3]],[]
    ];
    function lerp(a,b,t){ return a + (b-a)*t; }
    function edgePoint(e, gx, gy, v00, v10, v11, v01, thr, cellPx) {
      const x0 = gx*cellPx, y0 = gy*cellPx;
      const x1 = x0+cellPx,  y1 = y0+cellPx;
      let t;
      switch (e) {
        case 0: t=(thr-v00)/(v10-v00); return [lerp(x0,x1,t), y0];
        case 1: t=(thr-v10)/(v11-v10); return [x1, lerp(y0,y1,t)];
        case 2: t=(thr-v01)/(v11-v01); return [lerp(x0,x1,t), y1];
        case 3: t=(thr-v00)/(v01-v00); return [x0, lerp(y0,y1,t)];
      }
    }

    const CELL_PX          = 10;
    const THRESHOLDS       = [-0.9, -0.6, -0.3, 0.0, 0.3, 0.6, 0.9];
    const TOPO_COLOR       = '#cce046';
    const LINE_WIDTH_BASE  = 1;
    const LINE_WIDTH_PEAK  = 2;
    const BASE_ALPHA       = 0.40;
    const PEAK_ALPHA_BOOST = 0.85;

    /* Sync scan to the wireframe's wfRadarScan CSS animation via the
       Web Animations API — same clock = no drift. */
    const WF_MASK_TILE_VH   = 100;
    const WF_MASK_LEAD_FRAC = 0.99;
    const WF_MASK_TAIL_FRAC = 0.49;
    const WF_PERIOD_MS      = 2000;
    let wfEl = null, wfScanAnim = null;
    function getWFScanY() {
      if (!wfEl) wfEl = document.querySelector('.wf');
      if (!wfEl) return null;
      if (!wfScanAnim) {
        const anims = wfEl.getAnimations();
        wfScanAnim = anims.find(a => a.animationName === 'wfRadarScan') || null;
        if (!wfScanAnim) return null;
      }
      const t = wfScanAnim.currentTime;
      if (t == null) return null;
      const phase = ((t % WF_PERIOD_MS) + WF_PERIOD_MS) % WF_PERIOD_MS / WF_PERIOD_MS;
      const vh = window.innerHeight;
      const tileH  = (WF_MASK_TILE_VH / 100) * vh;
      const deltaPx = phase * tileH;
      const leadPx  = WF_MASK_LEAD_FRAC * tileH;
      return (deltaPx + leadPx) % tileH;
    }

    function draw(timeMs) {
      ctx.clearRect(0, 0, W, H);
      const cols = Math.ceil(W / CELL_PX) + 1;
      const rows = Math.ceil(H / CELL_PX) + 1;
      const field = new Float32Array((cols + 1) * (rows + 1));
      for (let j = 0; j <= rows; j++) {
        for (let i = 0; i <= cols; i++) {
          field[j*(cols+1)+i] = waterField(i*CELL_PX, j*CELL_PX, timeMs);
        }
      }

      const paths = [];
      for (let ti = 0; ti < THRESHOLDS.length; ti++) {
        const thr = THRESHOLDS[ti];
        const path = new Path2D();
        for (let j = 0; j < rows; j++) {
          for (let i = 0; i < cols; i++) {
            const v00 = field[j*(cols+1)+i];
            const v10 = field[j*(cols+1)+i+1];
            const v11 = field[(j+1)*(cols+1)+i+1];
            const v01 = field[(j+1)*(cols+1)+i];
            let key = 0;
            if (v00 > thr) key |= 1;
            if (v10 > thr) key |= 2;
            if (v11 > thr) key |= 4;
            if (v01 > thr) key |= 8;
            const segs = MS[key];
            for (let s = 0; s < segs.length; s++) {
              const [a, b] = segs[s];
              const [ax, ay] = edgePoint(a, i, j, v00, v10, v11, v01, thr, CELL_PX);
              const [bx, by] = edgePoint(b, i, j, v00, v10, v11, v01, thr, CELL_PX);
              path.moveTo(ax, ay);
              path.lineTo(bx, by);
            }
          }
        }
        paths.push(path);
      }

      ctx.strokeStyle = TOPO_COLOR;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';

      // Pass 1: base thin pass
      ctx.lineWidth   = LINE_WIDTH_BASE;
      ctx.globalAlpha = BASE_ALPHA;
      for (const p of paths) ctx.stroke(p);

      // Pass 2: scan-reveal (peak strokes + gradient mask)
      const scanY = getWFScanY();
      if (scanY == null) return;
      const tailPx = WF_MASK_TAIL_FRAC * (WF_MASK_TILE_VH / 100) * window.innerHeight;
      const tailTopY = scanY - tailPx;
      if (scanY < 0 || tailTopY > H) return;

      offCtx.clearRect(0, 0, W, H);
      offCtx.globalCompositeOperation = 'source-over';
      offCtx.strokeStyle = TOPO_COLOR;
      offCtx.lineCap = 'round';
      offCtx.lineJoin = 'round';
      offCtx.lineWidth = LINE_WIDTH_PEAK;
      offCtx.globalAlpha = 1;
      for (const p of paths) offCtx.stroke(p);

      offCtx.globalCompositeOperation = 'destination-in';
      const grad = offCtx.createLinearGradient(0, 0, 0, H);
      const t1 = Math.max(0, Math.min(1, tailTopY / H));
      const t2 = Math.max(0, Math.min(1, scanY / H));
      const t3 = Math.min(1, t2 + 0.002);
      grad.addColorStop(0, 'rgba(0,0,0,0)');
      if (t1 > 0) grad.addColorStop(t1, 'rgba(0,0,0,0)');
      grad.addColorStop(t2, `rgba(0,0,0,${PEAK_ALPHA_BOOST})`);
      if (t3 < 1) {
        grad.addColorStop(t3, 'rgba(0,0,0,0)');
        grad.addColorStop(1, 'rgba(0,0,0,0)');
      }
      offCtx.fillStyle = grad;
      offCtx.fillRect(0, 0, W, H);

      offCtx.globalCompositeOperation = 'source-over';
      ctx.globalAlpha = 1;
      ctx.drawImage(offCv, 0, 0, W, H);
    }

    (function loop(t) { draw(t); requestAnimationFrame(loop); })(0);
  })();
  </script>
