<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1d2218" />
  <title>Simo Alberti — Work in Progress</title>
  <meta name="description" content="Ambitious Product Design Engineering leader fueled by optimism and a healthy disregard for the impossible. Site in progress." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Fraunces:ital,opsz,wght,SOFT@0,9..144,300..900,0..100;1,9..144,300..900,0..100&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=70" />
</head>
<body id="top">
  <div class="loader" aria-hidden="true">
    <div class="loader-lockup">
      <div class="ll-1">
        <span class="ch">S</span><span class="ch">I</span><span class="ch">M</span><span class="ch">O</span>
      </div>
      <div class="ll-2">
        <span class="ch">A</span><span class="ch">L</span><span class="ch">B</span><span class="ch">E</span><span class="ch">R</span><span class="ch">T</span><span class="ch">I</span>
      </div>
    </div>
    <div class="loader-bar"></div>
  </div>

  <div class="grain" aria-hidden="true"></div>
  <div class="scroll-progress" aria-hidden="true"></div>
  <div class="cursor-ring" aria-hidden="true"></div>
  <div class="cursor-dot" aria-hidden="true"></div>

  <nav class="nav">
    <div class="container nav-inner">
      <a class="nav-brand" href="#top">
        <span class="b-1">SIMO</span>
        <span class="b-2">Alberti</span>
      </a>
      <div class="nav-links">
        <a href="#top" class="active">Home</a>
        <span class="nav-disabled">Work</span>
        <span class="nav-disabled">Projects</span>
        <span class="nav-disabled">Contact</span>
      </div>
    </div>
  </nav>

  <!-- STAGE: the whole scene scales down as one tile, anchored left -->
  <section class="stage" aria-label="Hero">
    <div class="stage-pin" id="stagePin">
      <div class="stage-scale" id="stageScale">
        <div class="stage-bg" aria-hidden="true"></div>

        <div class="topo-bg" aria-hidden="true">
          <svg viewBox="0 0 1600 1000" preserveAspectRatio="none">
            <g id="topo-a"></g>
            <g id="topo-b"></g>
          </svg>
        </div>

        <div class="frame" id="frame">
          <div class="frame-inner">
            <img src="img/simo-portrait-v2.png" alt="Simo Alberti — portrait in navy tuxedo" />
          </div>
        </div>

        <div class="wf" aria-hidden="true">
          <div class="wf-glasses"></div>
        </div>
      </div>

      <div class="scroll-hint" aria-hidden="true">
        <span class="sh-line"></span>
        <span class="sh-label">Scroll</span>
      </div>

      <div class="stage-text" id="stageText">
        <span class="w hl">AMBITIOUS</span> <span class="w">PRODUCT</span> <span class="w">DESIGN</span>
        <span class="w">ENGINEERING</span> <span class="w">LEADER,</span>
        <span class="w">FUELED</span> <span class="w">BY</span> <span class="w hl">OPTIMISM,</span>
        <span class="w">DRIVEN</span> <span class="w">BY</span> <span class="w hl">PASSION,</span>
        <span class="w">WITH</span> <span class="w">A</span> <span class="w">HEALTHY</span> <span class="w">DISREGARD</span>
        <span class="w">FOR</span> <span class="w">THE</span> <span class="w hl">IMPOSSIBLE.</span>
      </div>
    </div>
  </section>

  <!-- WIP — replaces the rest of the site for now -->
  <section id="about" class="theme-light">
    <div class="container">
      <h3 class="big-headline reveal">
        <span class="hl-row">Work</span>
        <span class="hl-row"><em>in</em></span>
        <span class="hl-row">progress.</span>
      </h3>
    </div>
  </section>

  <script src="js/main.js?v=17"></script>
</body>
</html>
